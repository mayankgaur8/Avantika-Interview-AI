name: Build and deploy Node.js app to Azure Web App - avantika-interview-api

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    env:
      APP_NAME: avantika-interview-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install and build backend
        run: |
          cd backend
          npm ci
          npm run build

      - name: Prepare deploy zip
        run: |
          cd backend
          zip -r ../deploy.zip . -x ".git/*" "node_modules/*" "test/*" ".env*"

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_4BC9C7C9BDDC4E8D87E57131BC7138A2 || secrets.AZUREAPPSERVICE_CLIENTID }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_919845CEED244D51B52977402C32A27E || secrets.AZUREAPPSERVICE_TENANTID }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_4BB9B6EFBAB84AC0B316D1DF066A84BE || secrets.AZUREAPPSERVICE_SUBSCRIPTIONID }}

      - name: Discover resource group
        id: rg
        uses: azure/CLI@v2
        with:
          inlineScript: |
            RG=$(az webapp list --query "[?name=='${APP_NAME}'].resourceGroup | [0]" -o tsv)
            if [ -z "$RG" ]; then
              echo "Could not find resource group for ${APP_NAME}" >&2
              exit 1
            fi
            echo "resource_group=$RG" >> "$GITHUB_OUTPUT"

      - name: Enable build during deployment
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az webapp config appsettings set \
              --resource-group "${{ steps.rg.outputs.resource_group }}" \
              --name "${APP_NAME}" \
              --settings SCM_DO_BUILD_DURING_DEPLOYMENT=true ENABLE_ORYX_BUILD=true

      - name: Deploy to Azure Web App (CLI)
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az webapp deploy \
              --resource-group "${{ steps.rg.outputs.resource_group }}" \
              --name "${APP_NAME}" \
              --src-path deploy.zip \
              --type zip \
              --restart true
