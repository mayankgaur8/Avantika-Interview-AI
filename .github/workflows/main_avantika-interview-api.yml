name: Build and deploy Node.js app to Azure Web App - avantika-interview-api

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and build backend
        run: |
          cd backend
          npm install
          npm run build

      - name: Prepare backend artifact
        run: |
          cd backend
          zip -r ../release.zip . -x ".git/*" "node_modules/*" "test/*"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: .

      - name: Azure Login
        id: azure_login
        continue-on-error: true
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_4BC9C7C9BDDC4E8D87E57131BC7138A2 || secrets.AZUREAPPSERVICE_CLIENTID }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_919845CEED244D51B52977402C32A27E || secrets.AZUREAPPSERVICE_TENANTID }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_4BB9B6EFBAB84AC0B316D1DF066A84BE || secrets.AZUREAPPSERVICE_SUBSCRIPTIONID }}

      - name: Deploy to Azure Web App (OIDC)
        id: deploy_oidc
        if: ${{ steps.azure_login.outcome == 'success' }}
        continue-on-error: true
        uses: azure/webapps-deploy@v3
        with:
          app-name: avantika-interview-api
          package: release.zip

      - name: Deploy to Azure Web App (Publish Profile fallback)
        id: deploy_publish
        if: ${{ steps.azure_login.outcome != 'success' || steps.deploy_oidc.outcome != 'success' }}
        continue-on-error: true
        uses: azure/webapps-deploy@v3
        with:
          app-name: avantika-interview-api
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: release.zip

      - name: Fail with auth guidance
        if: ${{ steps.deploy_oidc.outcome != 'success' && steps.deploy_publish.outcome != 'success' }}
        run: |
          echo "Azure deployment failed via both OIDC and publish-profile fallback."
          echo "Add one of these auth methods in GitHub repository secrets:"
          echo "1) OIDC: AZUREAPPSERVICE_CLIENTID*, AZUREAPPSERVICE_TENANTID*, AZUREAPPSERVICE_SUBSCRIPTIONID*"
          echo "2) Publish Profile: AZURE_WEBAPP_PUBLISH_PROFILE"
          exit 1
