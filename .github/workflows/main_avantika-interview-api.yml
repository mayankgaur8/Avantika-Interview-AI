name: Build and deploy Node.js app to Azure Web App - avantika-interview-api

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build backend
        run: npm run build

      - name: Prune dev dependencies
        run: npm prune --omit=dev

      - name: Prepare deployment package
        run: |
          mkdir -p ../deploy
          cp -r dist ../deploy/dist
          cp -r node_modules ../deploy/node_modules
          printf "[config]\nSCM_DO_BUILD_DURING_DEPLOYMENT=false\n" > ../deploy/.deployment

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-deploy
          path: deploy

  deploy:
    runs-on: ubuntu-latest
    needs: build
    env:
      APP_NAME: avantika-interview-api

    steps:
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-deploy
          path: backend-deploy

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID || secrets.AZUREAPPSERVICE_CLIENTID_4BC9C7C9BDDC4E8D87E57131BC7138A2 || secrets.AZUREAPPSERVICE_CLIENTID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID || secrets.AZUREAPPSERVICE_TENANTID_919845CEED244D51B52977402C32A27E || secrets.AZUREAPPSERVICE_TENANTID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID || secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_4BB9B6EFBAB84AC0B316D1DF066A84BE || secrets.AZUREAPPSERVICE_SUBSCRIPTIONID }}

      - name: Deploy with Azure CLI
        run: |
          set -euxo pipefail
          az version
          RG="$(az webapp show --name "${APP_NAME}" --query "resourceGroup" -o tsv || true)"
          if [ -z "${RG}" ]; then
            RG="$(az webapp list --query "[?name=='${APP_NAME}'].resourceGroup | [0]" -o tsv || true)"
          fi
          if [ -z "${RG}" ]; then
            echo "Failed to find resource group for ${APP_NAME}"
            exit 1
          fi

          # Keep deployment deterministic: use prebuilt artifact and disable server-side Oryx build.
          az webapp config appsettings set \
            --resource-group "${RG}" \
            --name "${APP_NAME}" \
            --settings SCM_DO_BUILD_DURING_DEPLOYMENT=false ENABLE_ORYX_BUILD=false WEBSITE_RUN_FROM_PACKAGE=1

          az webapp config set \
            --resource-group "${RG}" \
            --name "${APP_NAME}" \
            --startup-file "node dist/main.js"

          cd backend-deploy
          zip -r ../deploy.zip .
          cd ..

          az webapp deployment source config-zip \
            --resource-group "${RG}" \
            --name "${APP_NAME}" \
            --src deploy.zip

          az webapp restart \
            --resource-group "${RG}" \
            --name "${APP_NAME}"
